{{- $p := .Values.postgres -}}
{{- if $p.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: obs-postgres-data
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ $p.persistence.size }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: obs-postgres
  labels: { app.kubernetes.io/name: postgresql, app.kubernetes.io/part-of: obs-lab }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app.kubernetes.io/name: postgresql }
  template:
    metadata:
      labels: { app.kubernetes.io/name: postgresql, app.kubernetes.io/part-of: obs-lab }
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: postgres
          image: {{ $p.image }}
          env:
            - { name: POSTGRES_USER, value: {{ $p.user | quote }} }
            - { name: POSTGRES_PASSWORD, value: {{ $p.password | quote }} }
            - { name: POSTGRES_DB, value: {{ $p.database | quote }} }
            # Keep PGDATA in a subdir so a mounted volume root (lost+found) is fine.
            - { name: PGDATA, value: /var/lib/postgresql/data/pgdata }
          ports:
            - { name: postgres, containerPort: 5432 }
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "{{ $p.user }}"] }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec: { command: ["pg_isready", "-U", "{{ $p.user }}"] }
            initialDelaySeconds: 15
          resources: {{- toYaml $p.resources | nindent 12 }}
      volumes:
        - name: data
          {{- if $p.persistence.enabled }}
          persistentVolumeClaim: { claimName: obs-postgres-data }
          {{- else }}
          emptyDir: {}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: obs-postgres
  labels: { app.kubernetes.io/name: postgresql, app.kubernetes.io/part-of: obs-lab }
spec:
  selector: { app.kubernetes.io/name: postgresql }
  ports:
    - { name: postgres, port: 5432, targetPort: postgres }
