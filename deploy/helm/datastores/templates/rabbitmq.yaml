{{- $r := .Values.rabbitmq -}}
{{- if $r.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: obs-rabbitmq-data
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ $r.persistence.size }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: obs-rabbitmq
  labels: { app.kubernetes.io/name: rabbitmq, app.kubernetes.io/part-of: obs-lab }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app.kubernetes.io/name: rabbitmq }
  template:
    metadata:
      labels: { app.kubernetes.io/name: rabbitmq, app.kubernetes.io/part-of: obs-lab }
    spec:
      containers:
        - name: rabbitmq
          image: {{ $r.image }}
          env:
            - { name: RABBITMQ_DEFAULT_USER, value: {{ $r.user | quote }} }
            - { name: RABBITMQ_DEFAULT_PASS, value: {{ $r.password | quote }} }
          ports:
            - { name: amqp, containerPort: 5672 }
            - { name: management, containerPort: 15672 }
          volumeMounts:
            - { name: data, mountPath: /var/lib/rabbitmq/mnesia }
          readinessProbe:
            exec: { command: ["rabbitmq-diagnostics", "-q", "ping"] }
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 10
          livenessProbe:
            exec: { command: ["rabbitmq-diagnostics", "-q", "ping"] }
            initialDelaySeconds: 40
            periodSeconds: 30
            timeoutSeconds: 15
          resources: {{- toYaml $r.resources | nindent 12 }}
      volumes:
        - name: data
          {{- if $r.persistence.enabled }}
          persistentVolumeClaim: { claimName: obs-rabbitmq-data }
          {{- else }}
          emptyDir: {}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: obs-rabbitmq
  labels: { app.kubernetes.io/name: rabbitmq, app.kubernetes.io/part-of: obs-lab }
spec:
  selector: { app.kubernetes.io/name: rabbitmq }
  ports:
    - { name: amqp, port: 5672, targetPort: amqp }
    - { name: management, port: 15672, targetPort: management }
