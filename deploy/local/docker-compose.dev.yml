# Local dependencies for fast iteration before the kind cluster exists (Phase 4).
# Brings up PostgreSQL and RabbitMQ; the Go services run on the host against
# these. Not used in-cluster — there Helm deploys the equivalents.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: obs
      POSTGRES_PASSWORD: obs
      POSTGRES_DB: obs
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obs"]
      interval: 2s
      timeout: 3s
      retries: 20

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: obs
      RABBITMQ_DEFAULT_PASS: obs
    ports:
      - "5672:5672"   # amqp
      - "15672:15672" # management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 3s
      timeout: 5s
      retries: 20
