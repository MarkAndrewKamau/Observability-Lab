# kind cluster for the observability lab.
# 1 control-plane + 2 workers gives enough room to spread the observability
# stack and the app services across nodes. Port maps expose Grafana and the
# gateway on the host for convenience.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: obs-lab
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 30080   # gateway NodePort
        hostPort: 8080
        protocol: TCP
      - containerPort: 30030   # Grafana NodePort
        hostPort: 3000
        protocol: TCP
  - role: worker
  - role: worker
